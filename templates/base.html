<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Student Recruitment Dashboard{% endblock %}</title>
  <meta name="description" content="Manage and track student recruitment with ease."/>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"/>

  <style>
    /* ── Root Design Tokens ───────────────────────────────────────── */
    :root {
      --brand-primary:   #6366f1;
      --brand-secondary: #8b5cf6;
      --brand-dark:      #1e1b4b;
      --bg-body:         #0f0e17;
      --bg-card:         #1a1930;
      --bg-card-hover:   #22203a;
      --border-color:    rgba(99, 102, 241, 0.2);
      --text-primary:    #f0eeff;
      --text-muted:      #9ca3af;
      --success:         #22c55e;
      --danger:          #ef4444;
      --warning:         #f59e0b;
      --info:            #38bdf8;
    }

    /* ── Global ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: 260px;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--brand-dark) 0%, #12113a 100%);
      border-right: 1px solid var(--border-color);
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .brand-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 1.2rem;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(99,102,241,.4);
    }

    .brand-text {
      font-size: .95rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .brand-text small {
      font-size: .7rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .sidebar-nav { padding: 20px 12px; flex: 1; }

    .nav-label {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .08em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 12px;
      margin: 16px 0 6px;
    }

    .nav-link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: .875rem;
      font-weight: 500;
      transition: all .2s ease;
      margin-bottom: 2px;
    }
    .nav-link-item:hover,
    .nav-link-item.active {
      background: rgba(99,102,241,.15);
      color: var(--brand-primary);
    }
    .nav-link-item i { font-size: 1.05rem; }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-color);
      font-size: .75rem;
      color: var(--text-muted);
    }

    /* ── Main Content ─────────────────────────────────────────────── */
    .main-content {
      margin-left: 260px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: rgba(26, 25, 48, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .page-wrapper { padding: 32px; flex: 1; }

    /* ── Cards ────────────────────────────────────────────────────── */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 22px 24px;
      transition: transform .2s ease, box-shadow .2s ease;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,.08), transparent);
      pointer-events: none;
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }

    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: grid; place-items: center;
      font-size: 1.3rem;
      margin-bottom: 14px;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }
    .stat-label {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Table ────────────────────────────────────────────────────── */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
    }

    .table-card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .custom-table {
      width: 100%;
      border-collapse: collapse;
    }
    .custom-table thead th {
      background: rgba(99,102,241,.1);
      color: var(--text-muted);
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .custom-table tbody tr {
      border-bottom: 1px solid rgba(99,102,241,.08);
      transition: background .15s ease;
    }
    .custom-table tbody tr:last-child { border-bottom: none; }
    .custom-table tbody tr:hover { background: var(--bg-card-hover); }
    .custom-table tbody td {
      padding: 14px 20px;
      font-size: .875rem;
      color: var(--text-primary);
      vertical-align: middle;
    }

    /* ── Status Badges ────────────────────────────────────────────── */
    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .badge-status::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-new       { background:rgba(99,102,241,.15); color:#a5b4fc; }
    .status-contacted { background:rgba(245,158,11,.15); color:#fcd34d; }
    .status-enrolled  { background:rgba(34,197,94,.15);  color:#86efac; }
    .status-rejected  { background:rgba(239,68,68,.15);  color:#fca5a5; }

    /* ── Forms ────────────────────────────────────────────────────── */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 36px 40px;
      max-width: 620px;
      margin: 0 auto;
    }

    .form-control, .form-select {
      background: rgba(15,14,23,.6);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .875rem;
      transition: border-color .2s ease, box-shadow .2s ease;
    }
    .form-control:focus, .form-select:focus {
      background: rgba(15,14,23,.8);
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.25);
      color: var(--text-primary);
    }
    .form-control::placeholder { color: var(--text-muted); }
    .form-select option { background: #1a1930; color: var(--text-primary); }

    .form-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn-brand {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s ease, transform .15s ease, box-shadow .2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }
    .btn-brand:hover {
      opacity: .9;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,.4);
      color: #fff;
    }

    .btn-outline-muted {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .btn-outline-muted:hover {
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    .btn-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: inline-grid; place-items: center;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-muted);
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s ease;
      text-decoration: none;
    }
    .btn-icon:hover { color: var(--brand-primary); border-color: var(--brand-primary); }
    .btn-icon.danger:hover { color: var(--danger); border-color: var(--danger); }

    /* ── Search / Filter ──────────────────────────────────────────── */
    .search-input-wrap {
      position: relative;
    }
    .search-input-wrap i {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: .9rem;
    }
    .search-input-wrap input {
      padding-left: 36px;
      width: 220px;
    }

    /* ── Alert Messages ───────────────────────────────────────────── */
    .alert-custom {
      border-radius: 12px;
      padding: 12px 18px;
      font-size: .875rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid;
      margin-bottom: 20px;
    }
    .alert-success { background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.3); color:#86efac; }
    .alert-danger  { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.3);  color:#fca5a5; }

    /* ── Avatar ───────────────────────────────────────────────────── */
    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
      display: grid; place-items: center;
      font-size: .8rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    /* ── Empty State ──────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 3rem; opacity: .4; margin-bottom: 16px; }

    /* ── Scrollbar ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--brand-primary); }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .page-wrapper { padding: 16px; }
      .form-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- ══ Sidebar ══════════════════════════════════════════════════════════ -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <div class="brand-text">
      RecruitHub<br>
      <small>Student Dashboard</small>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Main Menu</div>
    <a href="{% url 'student_list' %}" id="nav-dashboard"
       class="nav-link-item {% if request.resolver_match.url_name == 'student_list' %}active{% endif %}">
      <i class="bi bi-grid-1x2"></i> Dashboard
    </a>
    <a href="{% url 'add_student' %}" id="nav-add"
       class="nav-link-item {% if request.resolver_match.url_name == 'add_student' or request.resolver_match.url_name == 'edit_student' %}active{% endif %}">
      <i class="bi bi-person-plus"></i> Add Student
    </a>
    <div class="nav-label" style="margin-top:24px;">System</div>
    <a href="/admin/" id="nav-admin" class="nav-link-item" target="_blank">
      <i class="bi bi-shield-lock"></i> Admin Panel
    </a>
  </nav>

  <div class="sidebar-footer">
    &copy; 2025 RecruitHub &mdash; v1.0
  </div>
</aside>

<!-- ══ Main ═════════════════════════════════════════════════════════════ -->
<div class="main-content">
  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar-title">{% block page_title %}Dashboard{% endblock %}</span>
    <a href="{% url 'add_student' %}" class="btn-brand" id="topbar-add-btn">
      <i class="bi bi-plus-lg"></i> Add Student
    </a>
  </header>

  <!-- Messages -->
  <div class="page-wrapper" style="padding-bottom:0;">
    {% for message in messages %}
      <div class="alert-custom alert-{{ message.tags }}">
        <i class="bi bi-{% if message.tags == 'success' %}check-circle{% else %}exclamation-circle{% endif %}"></i>
        {{ message }}
      </div>
    {% endfor %}
  </div>

  <!-- Page Content -->
  <main>
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmz5Y//7RyVWABEL4Tc4fAuOY7"
        crossorigin="anonymous"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
